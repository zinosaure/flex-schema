name: flex-schema-tests

networks:
    flex-schema-tests-network:
        driver: bridge

services:
    mysql:
        image: mysql:latest
        container_name: mysql
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: testdb

        networks:
            - flex-schema-tests-network
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
            interval: 5s
            timeout: 3s
            retries: 20

    test-flex-schema:
        build:
            context: .
        container_name: test-flex-schema
        networks:
            - flex-schema-tests-network
        depends_on:
            mysql:
                condition: service_healthy
        volumes:
            - ./app:/app:rw
            - ../src:/app/src:rw
        working_dir: /app
        stdin_open: true
        tty: true
